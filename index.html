<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub de Atalhos v2.1 - POPUP FIX</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-layer-group"></i> Hub v2.1</h1>
                <button id="btn-add-group" class="btn-icon" title="Adicionar Grupo">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            
            <div class="sidebar-content" id="sidebar-content">
                <!-- Grupos e links serão renderizados aqui -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="breadcrumb" id="breadcrumb">
                    <span>Selecione um link</span>
                </div>
                <div class="toolbar-actions">
                    <button id="btn-edit-link" class="btn-icon" title="Editar Link" disabled>
                        <i class="fas fa-edit"></i>
                    </button>
                    <button id="btn-delete-link" class="btn-icon" title="Remover Link" disabled>
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <!-- Iframe Container -->
            <div class="iframe-container" id="iframe-container">
                <div class="empty-state">
                    <i class="fas fa-mouse-pointer"></i>
                    <p>Selecione um link no menu lateral</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal: Adicionar/Editar Grupo -->
    <div class="modal" id="modal-group">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-group-title">Novo Grupo</h3>
                <button class="btn-close" data-close="modal-group"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="group-id">
                <div class="form-group">
                    <label>Nome do Grupo</label>
                    <input type="text" id="group-name" placeholder="EX: EXIBIÇÕES">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" data-close="modal-group">Cancelar</button>
                <button class="btn-primary" id="btn-save-group">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal: Adicionar/Editar Link -->
    <div class="modal" id="modal-link">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-link-title">Novo Link</h3>
                <button class="btn-close" data-close="modal-link"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="link-id">
                <div class="form-group">
                    <label>Grupo</label>
                    <select id="link-group">
                        <!-- Opções dinâmicas -->
                    </select>
                </div>
                <div class="form-group">
                    <label>Nome do Link</label>
                    <input type="text" id="link-name" placeholder="EX: Prime Video">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="link-url" placeholder="https://primevideo.com">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" data-close="modal-link">Cancelar</button>
                <button class="btn-primary" id="btn-save-link">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Iframe Blocked Fallback -->
    <template id="template-blocked">
        <div class="blocked-fallback">
            <i class="fas fa-ban"></i>
            <h3>Este site não permite abertura embutida</h3>
            <p>O site bloqueia abertura em iframe por questões de segurança.</p>
            <a href="#" target="_blank" class="btn-primary btn-external">
                <i class="fas fa-external-link-alt"></i> Abrir em nova aba
            </a>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
